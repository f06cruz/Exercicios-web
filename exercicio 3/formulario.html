<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de contacto do CESAE</title>
    <link rel="icon" type="image/x-icon" href="/img/cao2.jpg">
</head>
<body>
    <main>
    <form action="" method="get">
    <header>
        <img src="https://www.cesaedigital.pt/fldrSite/img/cesae-digital-logo.svg" alt="">
    </header>
    <nav>
        <a href="https://www.cesaedigital.pt/fldrSite/default.aspx" target="_blank"><h4>Ir para o site oficial</h4></a>
        <a href="/exercicio.html" target="_blank"><h4>Ir para exercicio</h4></a> 
        <a href="/formulario.html" target="_blank"><h4>Ir para formulário</h4></a> 
        <a href="/multimedia.html" target="_blank"><h4>Ir para multimédia</h4></a> 
    </nav>
    <div>
        <fieldset>
        <legend>Formulário de contacto do CESAE</legend>
        <div>
            <label for="">Nome:</label>
            <input type="text" name= "form-nome" id="" required placeholder="Insira o seu nome aqui">
        </div>
        <div>
            <label for="">Email: </label>
            <input type="email" name="form-mail" id="" required><br>
        <br>
        </div>
        <div>
            <label for="">Género</label><br>
            <input type="radio" name="form-radio" id=""> Masculino<br>
            <input type="radio" name="form-radio" id=""> Femenino<br>
        <br>
        </div>
        <div>
            <label for="">Data atual:</label>
            <input type="date" name="form_data" id="">
        </div>
        <div>
            <label for="">Turma:</label>
                <select name="form-turma" id="">
                    <option value="form-curso-web" selected>Web Developer & Mobile</option><br>
                    <option value="form-curso-outra">Outra</option><br>
                </select>
        </div>
        <div>
            <label for="">Mensagem:</label>
            <textarea name="" id="" cols="30" rows="3" maxlength="15"></textarea>
        </div>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </fieldset>
    </div>
    </form>
    </main>
    <br>
    <footer>Desemvolvido por Filipe Cruz</footer>
    
</body>
</html>
