<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Pessoais</title>
</head>
<body>
    
    <h1>formulario</h1>
    <form action="exercicio.html" method="get">
    <fieldset>
        <legend>Dados Pessoais</legend>
        <div>
    <label for="">exemplo:</label>
    <input type="text" name= "form-ex" id="ex_id" required readonly value="Não dá para alterar">
    </div>
        <div>
    <label for="">Nome:</label>
    <input type="text" name= "form-nome" id="nome_id" required placeholder="Insira o seu nome">
    </div>
    <div>
    <label for="">Email: </label>
    <input type="email" name="form-mail" id="email_id" required value="@cesae.pt">
    </div>
    <div>
        <label for="">Password: </label>
        <input type="password" name="form-password" id="pass_id" required>
    </div>
    <div><label for="">Data:</label>
        <input type="date" name="form_data" id="">
    </div>
    
    <div>
        <label for="CV"></label><input type="file"></label></div>
    <div>
        <div><label for="">Melhor formador</label><br>
        <input type="radio" name="form_melhor" id="">Vitor<br>
        <input type="radio" name="form_melhor" id="">Alexandre<br>
        <input type="radio" name="form_melhor" id="">Bruno<br>
        <input type="radio" name="form_melhor" id="">Sara<br>
    
    </div>
    <div>
        <label for="">Dias da Semana</label><br>
        <input type="checkbox" name="form-checkbox" id=""> Segunda<br>
        <input type="checkbox" name="form-checkbox" id=""> Terça<br>
        <input type="checkbox" name="form-checkbox" id=""> Quarta<br>
        <input type="checkbox" name="form-checkbox" id=""> Quinta<br>
        <input type="checkbox" name="form-checkbox" id=""> Sexta<br>
    </div>
    <div>
        <label for="">Curso:</label><br>
            <select name="form-curso" id="">
                <option value=""disabled selected>Escolha</option><br>
                <option value="form-curso-sd">Software</option><br>
                <option value="form-curso-ds">Data</option><br>
                <option value="form-curso-cs">Cybersecurity</option><br>
            </select>        
    </div>
    <div>
        <label for="">Mensagem:</label><br>
        <textarea name="" id="" cols="50" rows="5
        " maxlength="15"></textarea>
    </div>
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar">
    </div>
</form>
</fieldset>
</body>
</html>
